<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水やり診断</title>
  <style>
    :root {
      --bg: #eef6ef;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #617061;
      --green: #57b65d;
      --green-dark: #2f7d38;
      --green-soft: #dcefdc;
      --line: #d7e4d7;
      --gray-btn: #eef1ee;
      --soft-box: #f7faf7;
      --warning-soft: #fff7e6;
      --warning-text: #8a5a00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, #f7fbf7 0%, var(--bg) 55%),
        linear-gradient(180deg, #f4faf4 0%, #edf5ed 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin: 8px 0 18px;
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8bcf90 0%, #5cab61 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(76, 175, 80, 0.22);
      font-size: 28px;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .hero-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 10px 28px rgba(32, 73, 39, 0.08);
      padding: 26px 20px 22px;
    }

    .hidden { display: none; }

    .setup-title {
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin: 0 0 8px;
    }

    .setup-subtitle {
      font-size: 14px;
      text-align: center;
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .field {
      text-align: left;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 16px;
      background: #fff;
    }

    .status-badge {
      display: inline-block;
      margin: 0 auto 16px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: var(--green-soft);
      color: var(--green-dark);
    }

    #result {
      font-size: 34px;
      line-height: 1.25;
      font-weight: 800;
      text-align: center;
      margin: 0 0 14px;
    }

    #reason {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      text-align: center;
      min-height: 48px;
      margin-bottom: 18px;
    }

    .info-box {
      background: var(--soft-box);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .info-line {
      font-size: 14px;
      line-height: 1.7;
      margin: 2px 0;
    }

    .info-line.muted { color: var(--muted); }

    .plant-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .plant-inline-illustration {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plant-inline-illustration svg {
      width: 40px;
      height: 40px;
      display: block;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini-card {
      background: var(--soft-box);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 12px;
      text-align: center;
    }

    .mini-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .mini-value {
      font-size: 20px;
      font-weight: 800;
    }

    .feedback-box {
      background: var(--warning-soft);
      border: 1px solid #f1d49a;
      color: var(--warning-text);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      text-align: center;
    }

    .feedback-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .feedback-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .feedback-button {
      background: #fff;
      color: var(--warning-text);
      border: 1px solid #e8c574;
      box-shadow: none;
      font-size: 14px;
      padding: 11px 10px;
      border-radius: 12px;
    }

    #status {
      font-size: 14px;
      color: var(--green-dark);
      min-height: 22px;
      margin: 6px 0 8px;
      text-align: center;
      font-weight: 700;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-button {
      background: linear-gradient(180deg, #63bf68 0%, var(--green) 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(76, 175, 80, 0.2);
      margin-top: 6px;
    }

    .secondary-button {
      background: var(--gray-btn);
      color: #3c493d;
      margin-top: 10px;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-icon">🌿</div>
      <p class="hero-title">水やり診断</p>
      <p class="hero-subtitle">迷わず、今日やるべきことだけ分かる。</p>
    </div>

    <div class="card" id="setupScreen">
      <div class="setup-title">最初に設定してください</div>
      <div class="setup-subtitle">
        植物・置き場所・地域を選ぶだけで、<br>
        今日の水やりを判定します。
      </div>

      <div class="field">
        <label for="plantSelect">植物種類</label>
        <select id="plantSelect">
          <option value="monstera">モンステラ</option>
          <option value="pothos">ポトス</option>
          <option value="sansevieria">サンスベリア</option>
          <option value="ficus">フィカス</option>
          <option value="calathea">カラテア</option>
        </select>
      </div>

      <div class="field">
        <label for="locationSelect">置き場所</label>
        <select id="locationSelect">
          <option value="indoor_bright">室内明るい</option>
          <option value="indoor_dark">室内暗い</option>
          <option value="outdoor">屋外</option>
        </select>
      </div>

      <div class="field">
        <label for="regionSelect">地域</label>
        <select id="regionSelect">
          <option value="hachioji">八王子</option>
          <option value="tokyo">東京</option>
          <option value="osaka">大阪</option>
          <option value="nagoya">名古屋</option>
          <option value="fukuoka">福岡</option>
        </select>
      </div>

      <button id="saveSettingsBtn" class="primary-button" type="button">設定して始める</button>
      <div class="footer-note">デモ版のため、現在は1つの植物のみ対応しています</div>
    </div>

    <div class="card hidden" id="homeScreen">
      <div class="status-badge">今日の判定</div>
      <div id="result">判定中...</div>
      <div id="reason"></div>

      <div class="info-box">
        <div class="info-line plant-row">
          <div id="plantIllustration" class="plant-inline-illustration"></div>
          <div id="plantInfo"></div>
        </div>
        <div class="info-line muted" id="weather"></div>
        <div class="info-line muted" id="humidityInfo"></div>
        <div class="info-line muted" id="lastWateredText"></div>
      </div>

      <div class="mini-grid">
        <div class="mini-card">
          <div class="mini-label">経過日数</div>
          <div class="mini-value" id="daysSinceText">-</div>
        </div>
        <div class="mini-card">
          <div class="mini-label">水やり目安</div>
          <div class="mini-value" id="requiredDaysText">-</div>
        </div>
      </div>

      <div class="info-box">
        <div class="info-line" id="nextWateringText"></div>
      </div>

      <div class="feedback-box hidden" id="feedbackBox">
        <div class="feedback-title">本日は水やり推奨日です。土の状態はどうですか？</div>
        <div class="feedback-buttons">
          <button class="feedback-button" type="button" data-feedback="dry">乾燥気味</button>
          <button class="feedback-button" type="button" data-feedback="good">ちょうどいい</button>
          <button class="feedback-button" type="button" data-feedback="wet">まだ湿ってる</button>
        </div>
      </div>

      <div id="status"></div>
      <button id="waterBtn" class="primary-button" type="button">水やりした</button>
      <button id="resetBtn" class="secondary-button" type="button">設定を変更する</button>
    </div>
  </div>

  <script>
    const REGION_MAP = {
      hachioji: { name: "八王子", lat: 35.65, lon: 139.34 },
      tokyo: { name: "東京", lat: 35.68, lon: 139.76 },
      osaka: { name: "大阪", lat: 34.69, lon: 135.50 },
      nagoya: { name: "名古屋", lat: 35.18, lon: 136.91 },
      fukuoka: { name: "福岡", lat: 33.59, lon: 130.40 }
    };

    const PLANT_MAP = {
      monstera: { name: "モンステラ", baseDays: 4 },
      pothos: { name: "ポトス", baseDays: 4 },
      sansevieria: { name: "サンスベリア", baseDays: 7 },
      ficus: { name: "フィカス", baseDays: 5 },
      calathea: { name: "カラテア", baseDays: 3 }
    };

    const LOCATION_MAP = {
      indoor_bright: { name: "室内明るい", factor: 1.0 },
      indoor_dark: { name: "室内暗い", factor: 1.15 },
      outdoor: { name: "屋外", factor: 0.9 }
    };

    function getSettings() {
      const raw = localStorage.getItem("plantAppSettings");
      return raw ? JSON.parse(raw) : null;
    }

    function saveSettings(settings) {
      localStorage.setItem("plantAppSettings", JSON.stringify(settings));
    }

    function getLastWatered() {
      return localStorage.getItem("lastWatered");
    }

    function toStartOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function getDayDifference(dateString) {
      const savedDay = toStartOfDay(dateString);
      const todayDay = toStartOfDay(new Date());
      return Math.floor((todayDay.getTime() - savedDay.getTime()) / (1000 * 60 * 60 * 24));
    }

    function tempFactor(temp) {
      if (temp >= 30) return 0.75;
      if (temp >= 25) return 0.9;
      if (temp >= 20) return 1.0;
      if (temp >= 15) return 1.15;
      return 1.3;
    }

    function humidityFactor(humidity) {
      if (humidity >= 80) return 1.05;
      if (humidity >= 60) return 1.0;
      if (humidity >= 40) return 0.95;
      return 0.9;
    }

    function saturationVaporPressure(tempC) {
      return 6.112 * Math.exp((17.67 * tempC) / (tempC + 243.5));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getEffectiveHumidity(outdoorTemp, outdoorHumidity, locationKey) {
      // 屋外はそのまま使う
      if (locationKey === "outdoor") {
       return Math.round(outdoorHumidity);
      }

      // 室内は50%を基準に外気の影響を弱く反映
      const indoorBaseHumidity = 50;

      // 外気との差分を弱めて反映（0.08がポイント）
      const weakOutdoorEffect = (outdoorHumidity - 60) * 0.08;

      const estimatedIndoorHumidity = indoorBaseHumidity + weakOutdoorEffect;

      // 室内として現実的な範囲に制限
      return Math.round(Math.max(45, Math.min(60, estimatedIndoorHumidity)));
    }

    function getReason(temp, humidity, need, plantName, locationName, hasRecord) {
      if (!hasRecord) return "初回は水やり後に記録してください";

      if (need) {
        if (temp >= 25 && humidity < 45) {
          return `${plantName}を${locationName}で管理しており、気温が高く乾きやすいためです。`;
        }
        if (humidity < 45) {
          return `${plantName}を${locationName}で管理しており、空気が乾燥ぎみで水切れしやすいためです。`;
        }
        return "前回の水やりから日数が経っており、そろそろ水やりの目安に近いためです。";
      }

      if (humidity >= 60) {
        return `${plantName}を${locationName}で管理しており、まだ乾ききっていない可能性があります。`;
      }
      if (temp < 20) {
        return `${plantName}を${locationName}で管理しており、気温が低めで水の減りがゆるやかです。`;
      }
      return "前回の水やりからまだ日数が浅く、今日は見送ってよさそうです。";
    }

    function formatLastWateredText(dateString) {
      if (!dateString) return "最終水やり：未記録";

      const diffDays = getDayDifference(dateString);
      if (diffDays <= 0) return "最終水やり：今日";
      if (diffDays === 1) return "最終水やり：昨日";
      return `最終水やり：${diffDays}日前`;
    }

    function ceilDays(value) {
      return Math.ceil(value);
    }

    function showSetupScreen() {
      document.getElementById("setupScreen").classList.remove("hidden");
      document.getElementById("homeScreen").classList.add("hidden");

      const settings = getSettings();
      if (settings) {
        document.getElementById("plantSelect").value = settings.plant;
        document.getElementById("locationSelect").value = settings.location;
        document.getElementById("regionSelect").value = settings.region;
      }
    }

    function showHomeScreen() {
      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("homeScreen").classList.remove("hidden");
    }

    function getPlantSvg(plantKey) {
      const svgs = {
        monstera: `<svg viewBox="0 0 160 160"><rect x="62" y="110" width="36" height="28" rx="6" fill="#c7a77a"/><rect x="68" y="60" width="4" height="50" fill="#4d8c52"/><rect x="88" y="54" width="4" height="56" fill="#4d8c52"/><path d="M70 62 C42 36, 28 44, 26 70 C42 82, 58 82, 74 68 Z" fill="#5fae63"/><path d="M90 56 C118 32, 136 40, 138 68 C122 80, 106 82, 86 64 Z" fill="#69b86d"/><path d="M82 80 C50 70, 38 88, 42 114 C64 120, 80 110, 86 90 Z" fill="#58a95d"/><path d="M96 82 C124 72, 138 90, 132 118 C110 122, 96 110, 92 90 Z" fill="#62b267"/></svg>`,
        pothos: `<svg viewBox="0 0 160 160"><rect x="60" y="112" width="40" height="24" rx="6" fill="#c7a77a"/><path d="M80 110 C80 82, 78 70, 70 54" stroke="#4d8c52" stroke-width="4" fill="none"/><path d="M80 110 C82 86, 90 72, 104 58" stroke="#4d8c52" stroke-width="4" fill="none"/><path d="M66 52 C48 44, 40 54, 44 70 C58 74, 68 66, 72 56 Z" fill="#6dbf70"/><path d="M104 56 C122 46, 132 56, 128 74 C114 78, 102 68, 98 58 Z" fill="#7acd7d"/><path d="M84 74 C66 66, 56 76, 58 92 C74 96, 86 90, 90 78 Z" fill="#68b96b"/></svg>`,
        sansevieria: `<svg viewBox="0 0 160 160"><rect x="58" y="112" width="44" height="24" rx="6" fill="#c7a77a"/><path d="M68 112 L74 34 L82 112 Z" fill="#4b8e4e"/><path d="M82 112 L88 24 L96 112 Z" fill="#5ba85f"/><path d="M94 112 L102 40 L108 112 Z" fill="#6bb56f"/><path d="M58 112 L66 50 L72 112 Z" fill="#6aae6d"/></svg>`,
        ficus: `<svg viewBox="0 0 160 160"><rect x="60" y="112" width="40" height="24" rx="6" fill="#c7a77a"/><rect x="78" y="54" width="4" height="58" fill="#7a5c3f"/><ellipse cx="58" cy="64" rx="18" ry="12" fill="#66b46a"/><ellipse cx="80" cy="48" rx="20" ry="13" fill="#71bf75"/><ellipse cx="102" cy="64" rx="18" ry="12" fill="#63af67"/><ellipse cx="72" cy="74" rx="18" ry="12" fill="#5ca760"/><ellipse cx="94" cy="78" rx="18" ry="12" fill="#6ab86e"/></svg>`,
        calathea: `<svg viewBox="0 0 160 160"><rect x="60" y="112" width="40" height="24" rx="6" fill="#c7a77a"/><rect x="70" y="70" width="3" height="42" fill="#5c9f60"/><rect x="82" y="62" width="3" height="50" fill="#5c9f60"/><rect x="94" y="70" width="3" height="42" fill="#5c9f60"/><ellipse cx="68" cy="66" rx="12" ry="24" fill="#6ebc72"/><ellipse cx="84" cy="56" rx="13" ry="28" fill="#79c77d"/><ellipse cx="98" cy="66" rx="12" ry="24" fill="#67b26b"/></svg>`
      };
      return svgs[plantKey] || "";
    }

    function saveFeedback(value) {
      const settings = getSettings();
      const logs = JSON.parse(localStorage.getItem("soilFeedbackLogs") || "[]");

      logs.push({
        date: new Date().toISOString(),
        feedback: value,
        settings
      });

      localStorage.setItem("soilFeedbackLogs", JSON.stringify(logs));

      const labelMap = {
        dry: "乾燥気味",
        good: "ちょうどいい",
        wet: "まだ湿ってる"
      };

      document.getElementById("status").innerText =
        `土の状態を記録しました：${labelMap[value]}`;
      document.getElementById("feedbackBox").classList.add("hidden");
    }

    async function fetchWeatherAndJudge() {
      try {
        const settings = getSettings();
        if (!settings) {
          showSetupScreen();
          return;
        }

        const region = REGION_MAP[settings.region];
        const plant = PLANT_MAP[settings.plant];
        const location = LOCATION_MAP[settings.location];

        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${region.lat}&longitude=${region.lon}&current=temperature_2m,relative_humidity_2m`
        );
        const data = await res.json();

        const outdoorTemp = data.current.temperature_2m;
        const outdoorHumidity = data.current.relative_humidity_2m;
        const effectiveHumidity = getEffectiveHumidity(outdoorTemp, outdoorHumidity, settings.location);

        document.getElementById("plantIllustration").innerHTML = getPlantSvg(settings.plant);
        document.getElementById("weather").innerText =
          `${region.name}｜外気 ${outdoorTemp}°C / 外気湿度 ${Math.round(outdoorHumidity)}%`;
        document.getElementById("humidityInfo").innerText =
          settings.location === "outdoor"
            ? `判定用湿度：屋外 ${effectiveHumidity}%`
            : `判定用湿度：室内換算 ${effectiveHumidity}%`;
        document.getElementById("plantInfo").innerText = `${plant.name}｜${location.name}`;

        const saved = getLastWatered();
        document.getElementById("lastWateredText").innerText = formatLastWateredText(saved);

        if (!saved) {
          document.getElementById("result").innerText = "まず水やりしてください";
          document.getElementById("reason").innerText =
            getReason(outdoorTemp, effectiveHumidity, false, plant.name, location.name, false);
          document.getElementById("daysSinceText").innerText = "-";
          document.getElementById("requiredDaysText").innerText = "-";
          document.getElementById("nextWateringText").innerText = "次の目安：水やり後に表示されます";
          document.getElementById("feedbackBox").classList.add("hidden");
          showHomeScreen();
          return;
        }

        const daysSince = getDayDifference(saved);

        const rawRequiredDays =
          plant.baseDays *
          tempFactor(outdoorTemp) *
          humidityFactor(effectiveHumidity) *
          location.factor;

        const requiredDaysDisplay = ceilDays(Math.max(2, Math.min(14, rawRequiredDays)));
        const needWater = daysSince >= requiredDaysDisplay;
        const overdueDays = daysSince - requiredDaysDisplay;

        document.getElementById("result").innerText =
          needWater ? "水やり必要です" : "今日は不要です";
        document.getElementById("reason").innerText =
          getReason(outdoorTemp, effectiveHumidity, needWater, plant.name, location.name, true);

        document.getElementById("daysSinceText").innerText = `${daysSince}日`;
        document.getElementById("requiredDaysText").innerText = `${requiredDaysDisplay}日`;

        if (needWater) {
          document.getElementById("nextWateringText").innerText =
            overdueDays > 0
              ? `水やり目安から +${overdueDays}日 経過しています`
              : "次の目安：今日が水やりタイミングです";
          document.getElementById("feedbackBox").classList.remove("hidden");
        } else {
          const remainDays = requiredDaysDisplay - daysSince;
          document.getElementById("nextWateringText").innerText =
            `次の目安：あと${remainDays}日くらい`;
          document.getElementById("feedbackBox").classList.add("hidden");
        }

        showHomeScreen();
      } catch (error) {
        document.getElementById("result").innerText = "判定に失敗しました";
        document.getElementById("reason").innerText = "通信状況を確認してください。";
        document.getElementById("feedbackBox").classList.add("hidden");
        showHomeScreen();
      }
    }

    async function watered() {
      localStorage.setItem("lastWatered", new Date().toISOString());
      document.getElementById("status").innerText = "記録しました";
      await fetchWeatherAndJudge();
    }

    function saveInitialSettings() {
      const plant = document.getElementById("plantSelect").value;
      const location = document.getElementById("locationSelect").value;
      const region = document.getElementById("regionSelect").value;

      saveSettings({ plant, location, region });
      document.getElementById("status").innerText = "";
      fetchWeatherAndJudge();
    }

    function resetSettings() {
      document.getElementById("status").innerText = "";
      showSetupScreen();
    }

    document.getElementById("saveSettingsBtn").addEventListener("click", saveInitialSettings);
    document.getElementById("waterBtn").addEventListener("click", watered);
    document.getElementById("resetBtn").addEventListener("click", resetSettings);

    document.querySelectorAll(".feedback-button").forEach((button) => {
      button.addEventListener("click", () => saveFeedback(button.dataset.feedback));
    });

    if (getSettings()) {
      fetchWeatherAndJudge();
    } else {
      showSetupScreen();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水やり診断</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f3f3f3;
      margin: 0;
      padding: 40px 20px;
      color: #222;
    }

    .card {
      max-width: 560px;
      margin: 40px auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 28px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 28px;
      font-weight: 700;
    }

    #result {
      font-size: 44px;
      font-weight: 800;
      margin: 0 0 20px;
      line-height: 1.2;
    }

    #reason {
      font-size: 18px;
      color: #666;
      line-height: 1.7;
      min-height: 64px;
      margin-bottom: 28px;
    }

    #weather {
      font-size: 18px;
      color: #666;
      margin-bottom: 28px;
    }

    #status {
      font-size: 16px;
      color: #16a34a;
      min-height: 24px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 20px 32px;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      min-width: 260px;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>今日の水やり</h1>
    <div id="result">判定中...</div>
    <div id="reason"></div>
    <div id="weather"></div>
    <div id="status"></div>
    <button id="waterBtn" type="button">水やりした</button>
  </div>

  <script>
    const LATITUDE = 35.65;
    const LONGITUDE = 139.34;
    const BASE_DAYS = 5;

    function getLastWatered() {
      let stored = localStorage.getItem("lastWatered");

      if (!stored) {
        stored = new Date(Date.now() - 4 * 24 * 60 * 60 * 1000).toISOString();
        localStorage.setItem("lastWatered", stored);
      }

      return stored;
    }

    function tempFactor(temp) {
      if (temp >= 30) return 0.7;
      if (temp >= 25) return 0.85;
      if (temp >= 20) return 1.0;
      if (temp >= 15) return 1.2;
      return 1.5;
    }

    function humidityFactor(humidity) {
      if (humidity >= 70) return 1.2;
      if (humidity >= 50) return 1.0;
      if (humidity >= 30) return 0.85;
      return 0.7;
    }

    function getReason(temp, humidity, need) {
      if (need) {
        if (temp >= 25 && humidity < 50) {
          return "気温が高く、湿度も低めで乾きやすいためです。";
        }
        if (temp >= 25) {
          return "気温が高めで土が乾きやすいためです。";
        }
        if (humidity < 50) {
          return "空気が乾燥ぎみで、水切れしやすいためです。";
        }
        return "前回の水やりから日数が経っているためです。";
      }

      if (humidity >= 70) {
        return "湿度が高めで、まだ乾ききっていない可能性があるためです。";
      }
      if (temp < 20) {
        return "気温が低めで、水の減りがゆるやかなためです。";
      }
      return "前回の水やりからまだ日数が浅いためです。";
    }

    async function fetchWeather() {
      try {
        const resultEl = document.getElementById("result");
        const reasonEl = document.getElementById("reason");
        const weatherEl = document.getElementById("weather");

        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current=temperature_2m,relative_humidity_2m`
        );
        const data = await res.json();

        const temp = data.current.temperature_2m;
        const humidity = data.current.relative_humidity_2m;

        weatherEl.innerText = `気温 ${temp}°C / 湿度 ${humidity}%`;

        const saved = getLastWatered();
        const daysSince = Math.floor(
          (Date.now() - new Date(saved).getTime()) / (1000 * 60 * 60 * 24)
        );

        const requiredDays = Math.max(
          2,
          Math.min(14, BASE_DAYS * tempFactor(temp) * humidityFactor(humidity))
        );

        const needWater = daysSince >= requiredDays;

        resultEl.innerText = needWater ? "水やり必要です" : "今日は不要です";
        reasonEl.innerText = getReason(temp, humidity, needWater);
      } catch (error) {
        document.getElementById("result").innerText = "判定に失敗しました";
        document.getElementById("reason").innerText = "通信状況を確認してください。";
        document.getElementById("weather").innerText = "";
      }
    }

    async function watered() {
      localStorage.setItem("lastWatered", new Date().toISOString());
      document.getElementById("status").innerText = "記録しました";
      await fetchWeather();
    }

    document.getElementById("waterBtn").addEventListener("click", watered);

    fetchWeather();
  </script>
</body>
</html>
